name: Database Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 0"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          mkdir -p backups
          pg_dump "$DATABASE_URL" --format=custom --no-owner --no-privileges --file "backups/household-budget-$(date -u +%Y-%m-%dT%H-%M-%SZ).dump"

      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: household-budget-db-backup
          path: backups/*.dump
          retention-days: 30
